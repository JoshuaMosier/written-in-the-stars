<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Written in the Stars</title>
		<meta name="description" content="Some things are written in the stars. Type any word and watch real stars spell it across the night sky. Create your own constellation from actual star catalog data." />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Written in the Stars" />
		<meta property="og:description" content="Some things are written in the stars. Type any word and watch real stars spell it across the night sky." />
		<meta property="og:image" content="https://starspelled.com/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://starspelled.com" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Written in the Stars" />
		<meta name="twitter:description" content="Some things are written in the stars. Type any word and watch real stars spell it across the night sky." />
		<meta name="twitter:image" content="https://starspelled.com/og-image.png" />

		<!-- PWA / Icons -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#000005" />
		<link rel="apple-touch-icon" href="/icon-192.svg" />
		<link rel="icon" type="image/svg+xml" href="/icon-192.svg" />

		<!-- SEO -->
		<link rel="canonical" href="https://starspelled.com" />
		<meta name="robots" content="index, follow" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
