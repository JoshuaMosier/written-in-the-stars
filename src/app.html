<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Starspelled</title>
		<meta
			name="description"
			content="Some things are written in the stars. Type any word and watch real stars spell it across the night sky. Create your own constellation from actual star catalog data."
		/>

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Starspelled" />
		<meta
			property="og:description"
			content="Some things are written in the stars. Type any word and watch real stars spell it across the night sky."
		/>
		<meta property="og:image" content="https://starspelled.com/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://starspelled.com" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Starspelled" />
		<meta
			name="twitter:description"
			content="Some things are written in the stars. Type any word and watch real stars spell it across the night sky."
		/>
		<meta name="twitter:image" content="https://starspelled.com/og-image.png" />

		<!-- Icons -->
		<meta name="theme-color" content="#000005" />
		<link rel="apple-touch-icon" href="/icon-192.svg" />
		<link rel="icon" type="image/svg+xml" href="/icon-192.svg" />

		<!-- SEO -->
		<link rel="canonical" href="https://starspelled.com" />
		<meta name="robots" content="index, follow" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Marcellus&family=Space+Grotesk:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--font-ui: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
				--font-display: 'Marcellus', 'Iowan Old Style', 'Palatino Linotype', serif;
			}

			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #000005;
				color: #ccc;
				font-family: var(--font-ui);
				font-synthesis: none;
				text-rendering: optimizeLegibility;
			}

			button,
			input,
			textarea,
			select {
				font: inherit;
			}

			.app-noscript {
				position: fixed;
				left: 50%;
				bottom: calc(18px + env(safe-area-inset-bottom, 0px));
				transform: translateX(-50%);
				width: calc(100% - 32px);
				max-width: 480px;
				margin: 0;
				padding: 12px 16px;
				box-sizing: border-box;
				text-align: center;
				color: rgba(255, 255, 255, 0.72);
				background: rgba(0, 0, 0, 0.72);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 10px;
				font-size: 13px;
				line-height: 1.5;
			}
		</style>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "Starspelled",
				"url": "https://starspelled.com",
				"description": "Some things are written in the stars. Type any word and watch real stars spell it across the night sky.",
				"applicationCategory": "Entertainment",
				"operatingSystem": "Any",
				"offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
				"browserRequirements": "Requires WebGL"
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<noscript>
			<p class="app-noscript">JavaScript is required to run this app.</p>
		</noscript>
	</body>
</html>
